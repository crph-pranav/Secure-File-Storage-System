<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure File Storage System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/js/all.min.js"></script>
    <style>
        /* Styles remain the same */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            color: #ffffff;
            padding: 2rem;
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .header, .section {
            text-align: center;
            margin-bottom: 2rem;
            padding: 2rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }
        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #fbbf24;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .button {
            background: #fbbf24;
            color: #1f2937;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .button:hover {
            background: #f59e0b;
        }
        .file-list, .key-display {
            margin-top: 1rem;
            padding: 1rem;
            font-size: 0.875rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }
        .file-item {
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            gap: 1rem;
        }
        .file-item:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        .file-input-container {
            border: 2px dashed rgba(255, 255, 255, 0.3);
            padding: 2rem;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .file-input-container:hover {
            border-color: #fbbf24;
        }
        .file-input input {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-shield-alt"></i> Secure File Storage System</h1>
            <p>End-to-end encrypted File Storage</p>
        </div>

        <!-- Key Generation Section -->
        <div class="section">
            <h2 class="section-title">
                <i class="fas fa-key"></i> Key Management
            </h2>
            <button id="generateKeys" class="button">Generate RSA Keys</button>
            <div id="keyStatus" class="key-display" style="display: none;"></div>
        </div>

        <!-- File Upload Section -->
        <div class="section">
            <h2 class="section-title">
                <i class="fas fa-cloud-upload-alt"></i> File Upload
            </h2>
            <div class="file-input-container" id="dropZone">
                <i class="fas fa-file-upload fa-3x"></i>
                <p>Drag & drop or Click to browse</p>
                <input type="file" id="fileInput">
            </div>
            <button id="uploadButton" class="button" disabled>Encrypt & Upload</button>
            <div id="uploadStatus" class="key-display" style="display: none;"></div>
        </div>

        <!-- Stored Files Section -->
        <div class="section">
            <h2 class="section-title">
                <i class="fas fa-folder-open"></i> Stored Files
            </h2>
            <div id="fileList" class="file-list"></div>
        </div>
    </div>

    <script>
        async function generateKeys() {
            const status = document.getElementById('keyStatus');
            const confirmGeneration = confirm("Are you sure you want to generate a new RSA key pair? This will replace any existing keys.");
            if (!confirmGeneration) return;
            status.textContent = 'Generating keys...';
            status.style.display = 'block';

            try {
                const response = await fetch('/generate_keys', { method: 'POST' });
                const data = await response.json();
                status.textContent = data.message;
                status.className = data.status === 'success' ? 'key-display text-green-500' : 'key-display text-red-500';
            } catch (error) {
                status.textContent = 'Error generating keys: ' + error.message;
                status.className = 'key-display text-red-500';
            }
        }

        document.getElementById('generateKeys').addEventListener('click', generateKeys);

        document.getElementById('fileInput').addEventListener('change', function() {
            document.getElementById('uploadButton').disabled = !this.files.length;
        });

        document.getElementById('uploadButton').addEventListener('click', async () => {
            const fileInput = document.getElementById('fileInput');
            const uploadStatus = document.getElementById('uploadStatus');
            if (!fileInput.files.length) return;
            uploadStatus.textContent = 'Encrypting and uploading file...';
            uploadStatus.style.display = 'block';

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                const response = await fetch('/upload', { method: 'POST', body: formData });
                const data = await response.json();
                uploadStatus.textContent = data.message;
                uploadStatus.className = data.status === 'success' ? 'key-display text-green-500' : 'key-display text-red-500';
                loadFiles();
            } catch (error) {
                uploadStatus.textContent = 'Error uploading file: ' + error.message;
                uploadStatus.className = 'key-display text-red-500';
            }
        });

        async function loadFiles() {
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = '<div class="text-center">Loading...</div>';

            try {
                const response = await fetch('/files');
                const data = await response.json();
                
                if (data.status === 'success') {
                    fileList.innerHTML = data.files.map(file => `
                        <div class="file-item">
                            <span>${file.original_filename}</span>
                            <a href="/download/${file.encrypted_filename}" class="button">Download</a>
                            <button class="button" onclick="deleteFile('${file.encrypted_filename}')">Delete</button>
                        </div>
                    `).join('');
                } else {
                    fileList.innerHTML = '<div>No files stored yet.</div>';
                }
            } catch (error) {
                fileList.innerHTML = '<div class="text-red-500">Error loading files.</div>';
            }
        }

        async function deleteFile(filename) {
            if (!confirm("Are you sure you want to delete this file?")) return;
            
            try {
                const response = await fetch(`/delete/${filename}`, { method: 'DELETE' });
                const data = await response.json();
                
                alert(data.message);
                if (data.status === 'success') {
                    loadFiles(); // Refresh file list after deletion
                }
            } catch (error) {
                alert("Error deleting file: " + error.message);
            }
        }

        loadFiles();
    </script>
</body>
</html>
